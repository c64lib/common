plugins {
    id "com.github.c64lib.retro-assembler" version "1.1.1"
}

repositories {
    mavenCentral()
}

apply plugin: "com.github.c64lib.retro-assembler"

retroProject {

    dialect = "KickAssembler"
    dialectVersion = "5.20"
    libDirs = ["..", ".ra/deps/c64lib"]

    libFromGitHub "c64lib/64spec", "0.7.0pr"
}

